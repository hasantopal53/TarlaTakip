name: tarim_takip
description: "TarlaTakip - Akıllı Tarım Asistanı"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Harita
  google_maps_flutter: ^2.10.0

  # Konum
  geolocator: ^13.0.2

  # HTTP / API
  http: ^1.2.2

  # Yerel veritabanı
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Bildirimler
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4

  # State Management
  provider: ^6.1.2

  # Tarih formatlama
  intl: ^0.20.1

  # Resim cache
  cached_network_image: ^3.4.1

  # UUID
  uuid: ^4.5.1

  # İzin yönetimi
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
